name: Scrape Rio

on:
  schedule:
    # 12:00 AM Pacific = 07:00 UTC (PDT)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install selenium webdriver-manager supabase python-dotenv

      - name: Run Rio scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          RIO_USERNAME: ${{ secrets.RIO_USERNAME }}
          RIO_PASSWORD: ${{ secrets.RIO_PASSWORD }}
        run: python scrape_rio.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug/
          if-no-files-found: ignore
          retention-days: 3
