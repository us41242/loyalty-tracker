name: Daily Casino Rewards Scrape

on:
  schedule:
    # 6:00 AM Pacific = 13:00 UTC (PDT) or 14:00 UTC (PST)
    - cron: '0 13 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install undetected-chromedriver selenium supabase python-dotenv

      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CAESARS_USERNAME: ${{ secrets.CAESARS_USERNAME }}
          CAESARS_PASSWORD: ${{ secrets.CAESARS_PASSWORD }}
          MGM_EMAIL: ${{ secrets.MGM_EMAIL }}
          MGM_PASSWORD: ${{ secrets.MGM_PASSWORD }}
          RIO_USERNAME: ${{ secrets.RIO_USERNAME }}
          RIO_PASSWORD: ${{ secrets.RIO_PASSWORD }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scraper.py

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug/
          if-no-files-found: ignore
          retention-days: 3
