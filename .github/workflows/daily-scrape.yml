name: Daily Casino Rewards Scrape

on:
  schedule:
    # 6:00 AM Pacific = 13:00 UTC (PDT) or 14:00 UTC (PST)
    # Using 13:00 UTC to cover PDT (summer)
    - cron: '0 13 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser fonts-liberation libappindicator3-1 libasound2 libatk-bridge2.0-0 libatk1.0-0 libcups2 libdbus-1-3 libdrm2 libgbm1 libnspr4 libnss3 libx11-xcb1 libxcomposite1 libxdamage1 libxrandr2 xdg-utils

      - name: Run scraper
        env:
          CI: 'true'
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CAESARS_USERNAME: ${{ secrets.CAESARS_USERNAME }}
          CAESARS_PASSWORD: ${{ secrets.CAESARS_PASSWORD }}
          MGM_EMAIL: ${{ secrets.MGM_EMAIL }}
          MGM_PASSWORD: ${{ secrets.MGM_PASSWORD }}
          RIO_USERNAME: ${{ secrets.RIO_USERNAME }}
          RIO_PASSWORD: ${{ secrets.RIO_PASSWORD }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: node index.js
